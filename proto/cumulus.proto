syntax = "proto3";

package cumulus;

// ---------------------------------------------------------------------------
// Registration service
// ---------------------------------------------------------------------------

service Registration {
  rpc Register (RegisterRequest) returns (RegisterReply);
}

message RegisterRequest {
  string hostname    = 1;
  string ip_address  = 2;
  string os_platform = 3;
}

message RegisterReply {
  bool   success = 1;
  string message = 2;
}

// ---------------------------------------------------------------------------
// Backup service
// ---------------------------------------------------------------------------

service Backup {
  // Client streams file chunks up to the server
  rpc SendFile (stream FileChunk) returns (SendFileReply);

  // Client requests metadata for the next fully-uploaded file
  rpc GetNextFileChunks (GetNextFileChunksRequest) returns (GetNextFileChunksReply);

  // Receiving client requests a file; server streams chunks back
  rpc GetFileChunk (GetFileChunkRequest) returns (stream FileChunk);
}

message FileChunk {
  string file_id         = 1;
  string file_path       = 2;
  string checksum        = 3;
  int64  file_size       = 4;
  int32  chunk_index     = 5;
  int32  total_chunks    = 6;
  bytes  data            = 7;
  string source_hostname = 8;
}

message ChunkMeta {
  string file_id         = 1;
  string file_path       = 2;
  string checksum        = 3;
  int64  file_size       = 4;
  int32  chunk_index     = 5;
  int32  total_chunks    = 6;
  string source_hostname = 7;
}

message GetNextFileChunksRequest {}

message GetNextFileChunksReply {
  repeated ChunkMeta chunks = 1;  // Empty if no files are ready
}

message SendFileReply {
  bool   success = 1;
  string message = 2;
  string file_id = 3;
}

message GetFileChunkRequest {
  string file_id = 1;
}
