<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cumulus Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #0b0f14;
      --surface:  #111820;
      --border:   #1e2d3d;
      --accent:   #00c8ff;
      --accent2:  #0057ff;
      --success:  #00e57a;
      --muted:    #4a6070;
      --text:     #d0e8f5;
      --mono:     'Share Tech Mono', monospace;
      --sans:     'Syne', sans-serif;
    }

    /* Light theme overrides (apply by adding .light to <html>) */
    .light {
      --bg:       #ffffff;
      --surface:  #f6f9fb;
      --border:   #e6eef5;
      --accent:   #0066cc;
      --accent2:  #003f9a;
      --success:  #0a9a46;
      --muted:    #5b6b72;
      --text:     #0b1220;
    }

    /* When .light is not present, the :root dark variables are used (current defaults) */

    /* Theme toggle button */
    #theme-toggle {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      font-family: var(--mono);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      z-index: 0;
      pointer-events: none;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    /* Header */
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 48px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .logo-eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .logo-title {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-meta {
      text-align: right;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      line-height: 1.8;
    }

    .header-meta span {
      color: var(--accent);
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 24px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.4s ease both;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    /* Table */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
    }

    .table-title {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .refresh-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .pulse {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 12px 24px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }

    tbody tr:hover { background: rgba(0, 200, 255, 0.04); }

    tbody td {
      padding: 16px 24px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      vertical-align: middle;
    }

    .hostname {
      font-weight: 600;
    }

    .badge {
      display: inline-block;
      background: rgba(0, 200, 255, 0.08);
      border: 1px solid rgba(0, 200, 255, 0.2);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      color: var(--accent);
    }

    .empty-state {
      padding: 64px 24px;
      text-align: center;
      font-family: var(--mono);
      color: var(--muted);
      font-size: 13px;
      line-height: 2;
    }

    .empty-state strong {
      display: block;
      font-size: 18px;
      color: var(--border);
      margin-bottom: 8px;
      font-family: var(--sans);
      font-weight: 800;
    }

    /* Countdown ring */
    .countdown-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #countdown {
      color: var(--accent);
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.8); }
    }

    .row-enter {
      animation: fadeUp 0.3s ease both;
    }
  </style>
</head>
<body>
  <script>
    (function(){
      const KEY = 'theme'; // 'light' | 'dark' | 'system'
      const saved = localStorage.getItem(KEY);
      function systemPref() {
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      const theme = (saved === 'light' || saved === 'dark') ? saved : systemPref();
      if (theme === 'light') document.documentElement.classList.add('light');
      else document.documentElement.classList.remove('light');
      // expose for later DOM script to update the button state
      window.__CUMULUS_THEME = { key: KEY, saved };
      // react to system changes only when user hasn't explicitly chosen
      if (!saved) {
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
          const t = e.matches ? 'dark' : 'light';
          if (!localStorage.getItem(KEY)) {
            if (t === 'light') document.documentElement.classList.add('light');
            else document.documentElement.classList.remove('light');
          }
        });
      }
    })();
  </script>

  <div class="wrapper">
    <header>
      <div class="logo">
        <span class="logo-eyebrow">System Monitor</span>
        <span class="logo-title">Cumulus</span>
      </div>
      <div class="header-meta">
        <div>Last updated: <span id="last-updated">—</span></div>
        <div>Refreshes in: <span id="countdown">30</span>s</div>
      </div>
      <button id="theme-toggle" aria-label="Toggle theme">🌓</button>
    </header>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Registered Clients</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active (last 5 min)</div>
        <div class="stat-value" id="stat-active">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Platforms</div>
        <div class="stat-value" id="stat-platforms">—</div>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-header">
        <span class="table-title">Client Registry</span>
        <div class="refresh-indicator">
          <div class="pulse"></div>
          <span>Live</span>
        </div>
      </div>
      <div id="table-container">
        <div class="empty-state"><strong>Loading...</strong>Fetching client data</div>
      </div>
    </div>
  </div>

  <script>
    const REFRESH_INTERVAL = 30;
    let countdown = REFRESH_INTERVAL;
    let countdownTimer = null;

    function formatDate(str) {
      if (!str) return '—';
      const d = new Date(str.replace(' ', 'T') + 'Z');
      return d.toLocaleString();
    }

    function timeSince(str) {
      if (!str) return '—';
      const d = new Date(str.replace(' ', 'T') + 'Z');
      const diff = Math.floor((Date.now() - d) / 1000);
      if (diff < 60) return `${diff}s ago`;
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return `${Math.floor(diff / 86400)}d ago`;
    }

    function isActive(lastSeen) {
      if (!lastSeen) return false;
      const d = new Date(lastSeen.replace(' ', 'T') + 'Z');
      return (Date.now() - d) < 5 * 60 * 1000;
    }

    function renderTable(clients) {
      const container = document.getElementById('table-container');

      if (!clients.length) {
        container.innerHTML = `
          <div class="empty-state">
            <strong>No clients yet</strong>
            Run client.main on a machine to register it
          </div>`;
        return;
      }

      const rows = clients.map((c, i) => `
        <tr class="row-enter" style="animation-delay: ${i * 0.04}s">
          <td><span class="hostname">${c.hostname}</span></td>
          <td>${c.ip_address}</td>
          <td><span class="badge">${c.os_platform}</span></td>
          <td>${formatDate(c.first_seen)}</td>
          <td>${timeSince(c.last_seen)}</td>
        </tr>`).join('');

      container.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Hostname</th>
              <th>IP Address</th>
              <th>OS / Platform</th>
              <th>First Seen</th>
              <th>Last Seen</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function updateStats(clients) {
      document.getElementById('stat-total').textContent = clients.length;
      document.getElementById('stat-active').textContent = clients.filter(c => isActive(c.last_seen)).length;
      const platforms = new Set(clients.map(c => c.os_platform.split(' ')[0]));
      document.getElementById('stat-platforms').textContent = platforms.size;
    }

    async function fetchClients() {
      try {
        const res = await fetch('/api/clients');
        const clients = await res.json();
        renderTable(clients);
        updateStats(clients);
        document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();
      } catch (e) {
        console.error('Failed to fetch clients:', e);
      }
    }

    function startCountdown() {
      countdown = REFRESH_INTERVAL;
      clearInterval(countdownTimer);
      countdownTimer = setInterval(() => {
        countdown--;
        document.getElementById('countdown').textContent = countdown;
        if (countdown <= 0) {
          fetchClients();
          countdown = REFRESH_INTERVAL;
        }
      }, 1000);
    }

    fetchClients();
    // Theme toggle button handler
    (function(){
      const btn = document.getElementById('theme-toggle');
      if (!btn) return;
      const KEY = window.__CUMULUS_THEME?.key || 'theme';
      function isLight() { return document.documentElement.classList.contains('light'); }
      function applyBtn() { btn.textContent = isLight() ? '☀️' : '🌙'; }
      applyBtn();
      btn.addEventListener('click', () => {
        const nextIsLight = !isLight();
        document.documentElement.classList.toggle('light', nextIsLight);
        localStorage.setItem(KEY, nextIsLight ? 'light' : 'dark');
        applyBtn();
      });
    })();

    startCountdown();
  </script>
</body>
</html>
